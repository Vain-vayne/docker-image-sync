name: Sync Docker Hub to Aliyun ACR
on:
  workflow_dispatch:
    inputs:
      images:
        description: 'Docker Hub 镜像列表（多个镜像用空格/换行分隔，如：nginx:latest docker.io/redis:6.2 quay.io/calico/apiserver:v3.31.4）'
        required: true
      platforms:
        description: '目标平台架构（多个平台用逗号分隔，如：linux/amd64,linux/arm64,linux/arm/v7）'
        required: false
        default: 'linux/amd64,linux/arm64'

      # 可选：定时自动同步（每天 0 点 UTC）
  # schedule:
  #   - cron: '0 0 * * *'

jobs:
  sync-multiple-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Login to Aliyun ACR
        run: |
          docker login -u "${{ secrets.ACR_USERNAME }}" -p "${{ secrets.ACR_PASSWORD }}" ${{ secrets.ACR_REGISTRY }}

      - name: Sync multiple images to Aliyun ACR
        run: |
          # 分割镜像列表并遍历
          IFS=$' \n' read -r -a IMAGES <<< "${{ github.event.inputs.images }}"

          # 分割平台列表
          IFS=',' read -r -a PLATFORMS <<< "${{ github.event.inputs.platforms }}"

          # 遍历每个镜像进行同步
          for IMAGE in "${IMAGES[@]}"; do
            # 跳过空值（避免分隔符导致的空元素）
            [ -z "$IMAGE" ] && continue

            echo "====================================="
            echo "开始处理镜像：$IMAGE"
            echo "目标平台：${{ github.event.inputs.platforms }}"
            echo "====================================="

            # 补全 docker.io 前缀（仅无域名时）
            if [[ "$IMAGE" != *.*/* && "$IMAGE" == *:* && "$IMAGE" != */* ]]; then
              IMAGE_FULL="docker.io/$IMAGE"
            else
              IMAGE_FULL="$IMAGE"
            fi

            # 判断镜像名是否包含 ":"
            if [[ "$IMAGE_FULL" == *:* ]]; then
              # 有冒号：正常提取 TAG
              TAG=$(echo "$IMAGE_FULL" | awk -F ':' '{print $NF}')
            else
              # 无冒号：设为 latest，并修正 IMAGE_FULL
              TAG="latest"
              IMAGE_FULL="${IMAGE_FULL}:latest"
            fi

            # 遍历每个平台进行同步
            for PLATFORM in "${PLATFORMS[@]}"; do

              ACR_IMAGE="${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/$(echo "$IMAGE_FULL-$PLATFORM" | tr '/' '_')"

              # 核心逻辑：非 latest 标签时检查ACR是否已存在该镜像
              if [ "$TAG" != "latest" ]; then
                echo "检查阿里云ACR中是否存在镜像：$ACR_IMAGE"
                # 用 docker manifest inspect 检查镜像是否存在（无输出则不存在）
                if docker manifest inspect "$ACR_IMAGE" > /dev/null 2>&1; then
                  echo "✅ 镜像 $ACR_IMAGE 已存在，跳过同步"
                  echo ""
                  continue
                else
                  echo "🔍 镜像 $ACR_IMAGE 不存在，开始同步"
                fi
              else
                echo "📌 镜像标签为 latest，直接同步（不检查是否存在）"
              fi

              # 拉取镜像（指定平台）
              echo "拉取镜像：$IMAGE_FULL(平台: $PLATFORM)"
              if ! docker pull --platform "${PLATFORM}" "$IMAGE_FULL"; then
                echo "❌ 拉取失败，跳过该镜像"
                echo ""
                continue
              fi

              # 打标签并推送
              echo "打标签：$IMAGE_FULL → $ACR_IMAGE"
              docker tag "$IMAGE_FULL" "$ACR_IMAGE"

              echo "推送镜像到阿里云 ACR：$ACR_IMAGE"
              if docker push "$ACR_IMAGE"; then
                echo "✅ 镜像 $IMAGE 同步完成！国内地址：$ACR_IMAGE"
              else
                echo "❌ 推送镜像 $ACR_IMAGE 失败"
              fi
            done

            echo ""
          done

          echo "====================================="
          echo "🎉 所有镜像同步流程执行完毕！"
          echo "====================================="

      - name: Logout from Aliyun ACR
        if: always()  # 无论前面步骤是否成功，都执行登出
        run: |
          docker logout ${{ secrets.ACR_REGISTRY }}
